# spring.application.name=cms
# =========================
# APP
# =========================
spring.application.name=cms-platform-api
server.port=8080

# =========================
# DATABASE
# =========================
spring.datasource.url=jdbc:postgresql://localhost:5432/cms_platform
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# =========================
# FLYWAY
# =========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# =========================
# JSON
# =========================
spring.jackson.time-zone=Asia/Jakarta
# spring.jackson.serialization.write-dates-as-timestamps=false


app.api.base-path=/cms


# =========================
# JWT / RESOURCE SERVER
# =========================
app.jwt.issuer=windlabs-auth-service
app.jwt.secret=N4je88GCJf0cmdVvEfUCeS5U6OMV3q8g0a7Br8r9OzNbXGfkF/U37oWX17CXNufc81d9TVXEfvDGvs+IaF6seQ==

# =========================
# CORS
# =========================
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true